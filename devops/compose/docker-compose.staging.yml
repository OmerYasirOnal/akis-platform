# AKIS Platform - Staging Environment
# Docker Compose for staging deployment on OCI Free Tier
#
# Usage:
#   docker compose -f devops/compose/docker-compose.staging.yml up -d
#
# Prerequisites:
#   - .env.staging file with required environment variables
#   - Docker and Docker Compose installed on OCI VM
#   - SSH access configured in GitHub Secrets

name: akis-staging

services:
  # ============================================================================
  # Reverse Proxy - Caddy (HTTPS termination, static serving, API routing)
  # ============================================================================
  caddy:
    image: caddy:2-alpine
    container_name: akis-staging-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.staging:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - frontend_dist:/srv/frontend:ro
    networks:
      - staging-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # Backend - Fastify API Server
  # ============================================================================
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-akis}/akis-backend:${BACKEND_VERSION:-latest}
    container_name: akis-staging-backend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      # Core
      NODE_ENV: production
      PORT: "3000"
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      
      # Database
      DATABASE_URL: ${DATABASE_URL}
      
      # Auth
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-akis_sid}
      
      # URLs
      BACKEND_URL: ${BACKEND_URL:-https://staging.akisflow.com/api}
      FRONTEND_URL: ${FRONTEND_URL:-https://staging.akisflow.com}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://staging.akisflow.com}
      
      # Rate Limiting (relaxed for staging)
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-200}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-60000}
      
      # AI (optional)
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL_DEFAULT: ${AI_MODEL_DEFAULT:-}
      
      # MCP Gateway (optional)
      GITHUB_MCP_BASE_URL: ${GITHUB_MCP_BASE_URL:-}
    networks:
      - staging-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ============================================================================
  # Database - PostgreSQL 16
  # ============================================================================
  db:
    image: postgres:16-alpine
    container_name: akis-staging-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-akis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-akis_staging}
    volumes:
      - staging_pgdata:/var/lib/postgresql/data
    networks:
      - staging-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-akis} -d ${POSTGRES_DB:-akis_staging}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ============================================================================
  # MCP Gateway (optional - for GitHub/Jira/Confluence integrations)
  # ============================================================================
  mcp-gateway:
    image: ghcr.io/${GITHUB_REPOSITORY:-akis}/akis-mcp-gateway:${MCP_VERSION:-latest}
    container_name: akis-staging-mcp
    restart: unless-stopped
    profiles:
      - mcp
    expose:
      - "4010"
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      PORT: "4010"
    networks:
      - staging-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

# ============================================================================
# Networks
# ============================================================================
networks:
  staging-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ============================================================================
# Volumes
# ============================================================================
volumes:
  staging_pgdata:
    name: akis-staging-pgdata
  caddy_data:
    name: akis-staging-caddy-data
  caddy_config:
    name: akis-staging-caddy-config
  frontend_dist:
    name: akis-staging-frontend
