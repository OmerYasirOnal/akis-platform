# Hand Cursor v3 — Production Configuration
# ──────────────────────────────────────────────

camera:
  device: 0
  width: 640
  height: 480
  fps: 30

tracking:
  max_hands: 1
  detection_confidence: 0.7
  tracking_confidence: 0.5

gestures:
  # Tight thresholds — pinch must be deliberate
  pinch_threshold: 0.030
  right_click_threshold: 0.035
  scroll_threshold: 0.040
  pinch_ready_threshold: 0.065

  # Temporal stability
  pinch_frames: 3
  release_frames: 2

  # v3: Drag & Double-click
  drag_hold_time: 0.35       # Seconds pinch must be held to start drag
  double_click_window: 0.45  # Seconds between two pinches for double-click

  fist_pause: true

cursor:
  # Trackpad mode with adaptive acceleration
  sensitivity: 3.0
  acceleration: 1.3
  dead_zone: 4               # Slightly smaller dead zone (was 5)

  # v3: Hand loss recovery
  hand_lost_max_frames: 10   # Frames before resetting anchor

smoothing:
  # v3: More aggressive anti-jitter
  min_cutoff: 0.3            # Even smoother at rest (was 0.5)
  beta: 0.8                  # Faster response when moving (was 0.7)
  d_cutoff: 1.0
  velocity_lerp_threshold: 15.0  # Blend slow movements for extra smoothness

display:
  show_preview: true
  show_landmarks: true
  show_gestures: true
  show_debug: true
  preview_width: 640

sound:
  enabled: true
