version: '3.8'

services:
  db:
    # 1. ARM dostu ve hafif alpine imajı kullan
    image: postgres:16-alpine
    container_name: akis_v2_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: akis_v2
    ports:
      # 3. Portu .env dosyasından oku, bulunamazsa 5432'yi varsay
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 2. Basit healthcheck (veritabanının sorgulara hazır olmasını bekle)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d akis_v2"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    # Bu, verilerin docker durdurulsa bile kaybolmamasını sağlar