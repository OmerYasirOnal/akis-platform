<!DOCTYPE html><html><head><title>Counter</title></head><body><h1 id="count">0</h1><button onclick="inc()">+</button><button onclick="dec()">-</button><button onclick="reset()">Reset</button><script>let c=0;const el=document.getElementById("count");function inc(){el.textContent=++c}function dec(){el.textContent=--c}function reset(){c=0;el.textContent=c}</script></body></html>
