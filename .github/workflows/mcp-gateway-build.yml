# =============================================================================
# MCP Gateway — Docker Image Build & Push to GHCR
# =============================================================================
#
# Builds the akis-mcp-gateway Docker image and pushes to GitHub Container
# Registry when mcp-gateway/ source changes on main, or on manual dispatch.
#
# Image: ghcr.io/<owner>/akis-platform-devolopment/akis-mcp-gateway:<tag>
# Tags: latest, <commit-sha>
#
# Related: deploy/oci/staging/docker-compose.yml (always-on mcp-gateway service)
# Issue: #249
# =============================================================================

name: MCP Gateway Build

on:
  push:
    branches: [main]
    paths:
      - 'mcp-gateway/**'
      - '.github/workflows/mcp-gateway-build.yml'
  workflow_dispatch:

concurrency:
  group: mcp-gateway-build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  NODE_VERSION: '20'

jobs:
  build-and-push:
    name: Build & Push MCP Gateway Image
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image name
        id: vars
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${REPO_LC}/akis-mcp-gateway"
          COMMIT=${GITHUB_SHA::7}
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT
          echo "Image: ${IMAGE}"
          echo "Commit: ${COMMIT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push MCP Gateway image
        uses: docker/build-push-action@v5
        with:
          context: ./mcp-gateway
          file: ./mcp-gateway/Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:latest
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.commit }}
          cache-from: type=gha,scope=mcp-gateway
          cache-to: type=gha,mode=max,scope=mcp-gateway
          platforms: linux/amd64,linux/arm64
