name: Docs Quality Gate
on:
  pull_request:
    branches: [ "main" ]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        run: |
          set -e
          need_fail=0
          for f in README.md CHANGELOG.md LICENSE CONTRIBUTING.md env.example; do
            if [ ! -f "$f" ]; then
              echo "::error file=$f::Missing required file: $f"
              need_fail=1
            fi
          done
          if [ ! -d "docs" ]; then
            echo "::error::Missing docs directory"
            need_fail=1
          else
            for f in GETTING_STARTED.md ARCHITECTURE.md API.md; do
              if [ ! -f "docs/$f" ]; then
                echo "::error file=docs/$f::Missing required documentation: docs/$f"
                need_fail=1
              fi
            done
          fi

          # Quickstart / Getting Started detector (markdown h2/h3 tolerant)
          if grep -Eiq '^\s{0,3}#{2,3}\s*(quick\s*start|getting\s*started|başlangıç|hızlı\s*başlangıç)' README.md; then
            echo "✅ Quickstart section found in README.md"
          else
            echo "::error file=README.md::Quickstart/Getting Started section not found in README.md"
            need_fail=1
          fi

          if [ $need_fail -ne 0 ]; then
            echo "❌ Docs gate failed"
            exit 1
          fi
          echo "✅ Docs gate passed"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run markdown lint
        run: npm run lint:md || true

      - name: Check for broken links
        run: npm run check:links || true

      - name: Run doc proof
        run: npm run doc:proof || true

      - name: Summary
        if: always()
        run: |
          echo "### Documentation Quality Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Required files check passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Quickstart section verified" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See individual steps for details on linting and link checks." >> $GITHUB_STEP_SUMMARY

