name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Bootstrap Corepack for cache
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm@9
        run: corepack prepare pnpm@9 --activate

      - name: Install dependencies
        run: |
          pnpm -w install
          pnpm install --recursive --frozen-lockfile

      - name: Lint
        run: pnpm -r lint

  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Bootstrap Corepack for cache
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm@9
        run: corepack prepare pnpm@9 --activate

      - name: Install dependencies
        run: |
          pnpm -w install
          pnpm install --recursive --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

  build:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Bootstrap Corepack for cache
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm@9
        run: corepack prepare pnpm@9 --activate

      - name: Install dependencies
        run: |
          pnpm -w install
          pnpm install --recursive --frozen-lockfile

      - name: Build
        run: pnpm -r build

  backend-tests:
    runs-on: ubuntu-latest
    needs: build
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/akis_v2_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/akis_v2_test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: akis_v2_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Bootstrap Corepack for cache
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm@9
        run: corepack prepare pnpm@9 --activate

      - name: Install dependencies
        run: |
          pnpm -w install
          pnpm install --recursive --frozen-lockfile

      - name: Assert database URLs
        run: |
          if [ -z "${TEST_DATABASE_URL:-}" ]; then
            echo "TEST_DATABASE_URL environment variable is required for backend migrations/tests"
            exit 1
          fi
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "DATABASE_URL environment variable is required for backend migrations/tests"
            exit 1
          fi

      - name: Run database migrations
        run: pnpm --filter akis-backend run db:migrate:ci

      - name: Backend tests
        env:
          NODE_ENV: test
        run: pnpm --filter akis-backend test

  frontend-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Bootstrap Corepack for cache
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm@9
        run: corepack prepare pnpm@9 --activate

      - name: Install dependencies
        run: |
          pnpm -w install
          pnpm install --recursive --frozen-lockfile

      - name: Frontend tests
        run: pnpm --filter akis-frontend test
