name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install backend dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Typecheck
        working-directory: backend
        run: pnpm run typecheck

      - name: Lint
        working-directory: backend
        run: pnpm run lint

      - name: Unit Tests
        working-directory: backend
        env:
          NODE_ENV: test
          SKIP_DB_TESTS: 'true'
          SKIP_MCP_TESTS: 'true'
        run: pnpm run test:unit

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: frontend
        run: pnpm typecheck

      - name: Lint
        working-directory: frontend
        run: pnpm lint

      - name: Test
        working-directory: frontend
        run: pnpm test

      - name: Build
        working-directory: frontend
        run: pnpm build

      # E2E tests removed from CI — require live backend, run via nightly-smoke.yml

  # ===========================================================================
  # Build & Push ARM64 Docker Image to GHCR (main branch only)
  # ===========================================================================
  # Builds the backend image on GitHub Actions runner (4 vCPU, 16 GB RAM)
  # instead of the OCI ARM64 server (1 OCPU, 6 GB RAM).
  # Server only needs to `docker pull` — no build required.
  # This reduces deploy time from ~8 min to ~1.5 min.
  # ===========================================================================
  build-image:
    name: Build ARM64 Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract commit SHA
        id: meta
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "repo_lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo_lower }}/akis-backend:${{ steps.meta.outputs.short_sha }}
            ghcr.io/${{ steps.meta.outputs.repo_lower }}/akis-backend:latest
          build-args: |
            BUILD_COMMIT=${{ steps.meta.outputs.short_sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            APP_VERSION=0.2.0
          cache-from: type=gha
          cache-to: type=gha,mode=max
