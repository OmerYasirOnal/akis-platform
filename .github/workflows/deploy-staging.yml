# AKIS Platform - Staging Deployment
# Automatically deploys to staging when changes are merged to main
#
# Trigger: Push to main branch (after PR merge)
# Target: OCI Free Tier VM (staging.akis.dev)

name: Deploy to Staging

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.cursor/**'

# Prevent concurrent deployments
concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/akis-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/akis-frontend
  NODE_VERSION: '22.12.0'

jobs:
  # ============================================================================
  # Build and Test
  # ============================================================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: akis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    outputs:
      version: ${{ steps.version.outputs.version }}
      commit: ${{ steps.version.outputs.commit }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get version info
        id: version
        run: |
          VERSION=$(node -p "require('./backend/package.json').version")
          COMMIT=${GITHUB_SHA::7}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Commit: $COMMIT"

      - name: Install backend dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/akis_test
          NODE_ENV: test
        run: |
          pnpm db:migrate
          pnpm run typecheck
          pnpm run lint
          pnpm run test:ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Run frontend tests
        working-directory: frontend
        run: |
          npm run typecheck
          npm run lint
          npm run test

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: /api
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ============================================================================
  # Build Docker Images
  # ============================================================================
  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:staging
            ${{ env.BACKEND_IMAGE }}:${{ needs.build.outputs.commit }}
          build-args: |
            BUILD_COMMIT=${{ needs.build.outputs.commit }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            APP_VERSION=${{ needs.build.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ============================================================================
  # Deploy to Staging
  # ============================================================================
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, docker]
    environment:
      name: staging
      url: https://staging.akis.dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Get previous version for rollback
        id: previous
        run: |
          PREV_VERSION=$(ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "docker inspect akis-staging-backend --format '{{.Config.Image}}' 2>/dev/null || echo 'none'")
          echo "previous_image=$PREV_VERSION" >> $GITHUB_OUTPUT
          echo "Previous image: $PREV_VERSION"

      - name: Create backup before deploy
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
            cd /opt/akis
            # Backup database (lightweight for staging)
            docker exec akis-staging-db pg_dump -U akis akis_staging > /opt/akis/backups/staging-pre-deploy-$(date +%Y%m%d-%H%M%S).sql 2>/dev/null || true
          EOF

      - name: Deploy to staging server
        env:
          BACKEND_VERSION: ${{ needs.build.outputs.commit }}
        run: |
          # Copy compose files and Caddyfile
          scp -i ~/.ssh/deploy_key devops/compose/docker-compose.staging.yml \
            ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/akis/docker-compose.yml
          scp -i ~/.ssh/deploy_key devops/compose/Caddyfile.staging \
            ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/akis/Caddyfile.staging
          
          # Copy frontend dist
          scp -r -i ~/.ssh/deploy_key frontend/dist/* \
            ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/akis/frontend/
          
          # Deploy
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << EOF
            cd /opt/akis
            
            # Pull new images
            export BACKEND_VERSION=${{ needs.build.outputs.commit }}
            docker compose pull
            
            # Run migrations
            docker compose run --rm backend pnpm db:migrate || true
            
            # Deploy with rolling update
            docker compose up -d --remove-orphans
            
            # Cleanup old images
            docker image prune -f
          EOF

      - name: Wait for deployment
        run: sleep 30

      - name: Health check
        id: health
        run: |
          for i in {1..30}; do
            HEALTH=$(curl -s -o /dev/null -w "%{http_code}" https://staging.akis.dev/health || echo "000")
            READY=$(curl -s -o /dev/null -w "%{http_code}" https://staging.akis.dev/ready || echo "000")
            
            if [ "$HEALTH" = "200" ] && [ "$READY" = "200" ]; then
              echo "Health checks passed!"
              echo "health_status=success" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            echo "Attempt $i/30: health=$HEALTH, ready=$READY"
            sleep 5
          done
          
          echo "Health checks failed after 30 attempts"
          echo "health_status=failure" >> $GITHUB_OUTPUT
          exit 1

      - name: Verify deployed version
        if: steps.health.outputs.health_status == 'success'
        run: |
          DEPLOYED=$(curl -s https://staging.akis.dev/version | jq -r '.commit')
          EXPECTED="${{ needs.build.outputs.commit }}"
          
          if [ "$DEPLOYED" = "$EXPECTED" ]; then
            echo "✅ Version verified: $DEPLOYED"
          else
            echo "❌ Version mismatch: deployed=$DEPLOYED, expected=$EXPECTED"
            exit 1
          fi

      - name: Rollback on failure
        if: failure() && steps.previous.outputs.previous_image != 'none'
        run: |
          echo "⚠️ Deployment failed, rolling back to previous version..."
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << EOF
            cd /opt/akis
            docker compose pull backend:${{ steps.previous.outputs.previous_image }}
            docker compose up -d backend
          EOF

      - name: Save deployment log
        if: always()
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "docker compose -f /opt/akis/docker-compose.yml logs --tail=100" > deploy-logs.txt 2>&1 || true

      - name: Upload deployment logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-deploy-logs-${{ github.run_number }}
          path: deploy-logs.txt
          retention-days: 7

  # ============================================================================
  # Post-Deploy Notification
  # ============================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()

    steps:
      - name: Create deployment summary
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "## ✅ Staging Deployment Successful" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Staging Deployment Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ needs.build.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ needs.build.outputs.commit }} |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://staging.akis.dev |" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
