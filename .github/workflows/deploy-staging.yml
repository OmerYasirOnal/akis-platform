# AKIS Platform - Staging Deployment
# Automatically deploys to staging when changes are merged to main
#
# Trigger: Push to main branch (after PR merge)
# Target: OCI Free Tier VM (staging.akisflow.com)

name: Deploy to Staging

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.cursor/**'

# Prevent concurrent deployments
concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  NODE_VERSION: '22.12.0'

jobs:
  # ============================================================================
  # Build and Test
  # ============================================================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: akis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    outputs:
      version: ${{ steps.version.outputs.version }}
      commit: ${{ steps.version.outputs.commit }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get version info
        id: version
        run: |
          VERSION=$(node -p "require('./backend/package.json').version")
          COMMIT=${GITHUB_SHA::7}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Commit: $COMMIT"

      - name: Install backend dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/akis_test
          NODE_ENV: test
        run: |
          pnpm db:migrate
          pnpm run typecheck
          pnpm run lint
          pnpm run test:ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Run frontend tests
        working-directory: frontend
        run: |
          npm run typecheck
          npm run lint
          npm run test

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: /api
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ============================================================================
  # Build Docker Images
  # ============================================================================
  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build
    
    permissions:
      contents: read
      packages: write

    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}

    steps:
      - name: Compute lowercase image names
        id: meta
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "backend_image=ghcr.io/${REPO_LC}/akis-backend" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}:staging
            ${{ steps.meta.outputs.backend_image }}:${{ needs.build.outputs.commit }}
          build-args: |
            BUILD_COMMIT=${{ needs.build.outputs.commit }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            APP_VERSION=${{ needs.build.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ============================================================================
  # Deploy to Staging
  # ============================================================================
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, docker]
    environment:
      name: staging
      url: https://staging.akisflow.com

    steps:
      - name: Validate required secrets
        run: |
          MISSING=""
          # Check each required secret
          if [ -z "${{ secrets.STAGING_HOST }}" ]; then
            MISSING="$MISSING STAGING_HOST"
          fi
          if [ -z "${{ secrets.STAGING_USER }}" ]; then
            MISSING="$MISSING STAGING_USER"
          fi
          if [ -z "${{ secrets.STAGING_SSH_KEY }}" ]; then
            MISSING="$MISSING STAGING_SSH_KEY"
          fi

          if [ -n "$MISSING" ]; then
            echo "::error::❌ Missing required GitHub Secrets:$MISSING"
            echo ""
            echo "============================================================"
            echo "DEPLOYMENT BLOCKED: Required secrets are not configured"
            echo "============================================================"
            echo ""
            echo "To fix this, add the following secrets in GitHub:"
            echo "  Repository → Settings → Secrets and variables → Actions → New repository secret"
            echo ""
            echo "Required secrets:"
            echo "  STAGING_HOST     - Staging server IP or hostname (e.g., 192.168.1.100 or staging.akisflow.com)"
            echo "  STAGING_USER     - SSH username on the server (e.g., ubuntu, opc, akis)"
            echo "  STAGING_SSH_KEY  - Private SSH key in PEM format (ed25519 or RSA)"
            echo ""
            echo "For detailed setup instructions, see: docs/ops/STAGING_DEPLOYMENT.md"
            echo ""
            echo "Quick SSH key generation:"
            echo "  ssh-keygen -t ed25519 -C 'github-actions@akis' -f ~/.ssh/akis_deploy -N ''"
            echo "  # Add public key to server: cat ~/.ssh/akis_deploy.pub >> ~/.ssh/authorized_keys"
            echo "  # Add private key to GitHub Secrets as STAGING_SSH_KEY"
            echo ""
            exit 1
          fi
          echo "✅ All required deployment secrets are configured"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Get previous version for rollback
        id: previous
        run: |
          PREV_VERSION=$(ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "docker inspect akis-staging-backend --format '{{.Config.Image}}' 2>/dev/null || echo 'none'")
          echo "previous_image=$PREV_VERSION" >> $GITHUB_OUTPUT
          echo "Previous image: $PREV_VERSION"

      - name: Create backup before deploy
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
            cd /opt/akis
            # Backup database (lightweight for staging)
            docker exec akis-staging-db pg_dump -U akis akis_staging > /opt/akis/backups/staging-pre-deploy-$(date +%Y%m%d-%H%M%S).sql 2>/dev/null || true
          EOF

      - name: Verify server prerequisites
        run: |
          echo "Checking server prerequisites..."
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
            echo "=== Server Architecture ==="
            uname -m

            echo ""
            echo "=== Docker Version ==="
            docker --version || { echo "ERROR: Docker not installed"; exit 1; }

            echo ""
            echo "=== Docker Compose Version ==="
            docker compose version || docker-compose --version || { echo "ERROR: Docker Compose not available"; exit 1; }

            echo ""
            echo "=== Disk Space ==="
            df -h /opt/akis 2>/dev/null || df -h /

            echo ""
            echo "=== AKIS Directory ==="
            ls -la /opt/akis/ 2>/dev/null || echo "Directory /opt/akis does not exist (will be created)"
          EOF

      - name: Setup GHCR authentication on server
        run: |
          # Login to GHCR on the staging server for pulling private images
          # Uses GITHUB_TOKEN which has packages:read permission
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << EOF
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          EOF
          echo "✅ GHCR authentication configured on staging server"

      - name: Deploy to staging server
        env:
          BACKEND_VERSION: ${{ needs.build.outputs.commit }}
        run: |
          # Compute lowercase repo for image references
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          # Copy compose files and Caddyfile
          scp -i ~/.ssh/deploy_key devops/compose/docker-compose.staging.yml \
            ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/akis/docker-compose.yml
          scp -i ~/.ssh/deploy_key devops/compose/Caddyfile.staging \
            ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/akis/Caddyfile.staging
          
          # Copy frontend dist
          scp -r -i ~/.ssh/deploy_key frontend/dist/* \
            ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/akis/frontend/
          
          # Write .env with deterministic image references (survives reboots)
          echo "=== Writing image references to .env ==="
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/akis && touch .env && sed -i '/^GITHUB_REPOSITORY=/d; /^BACKEND_VERSION=/d' .env"
          
          # Write env vars (variables expanded locally)
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/akis && echo 'GITHUB_REPOSITORY=${REPO_LC}' >> .env && echo 'BACKEND_VERSION=${{ needs.build.outputs.commit }}' >> .env"
          
          echo "Image: ghcr.io/${REPO_LC}/akis-backend:${{ needs.build.outputs.commit }}"

      - name: Pull Docker images
        run: |
          echo "=== Pulling new images ==="
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/akis && docker compose pull"

      - name: Run database migrations
        run: |
          echo "=== Running database migrations ==="
          # Migration may fail if schema is already up-to-date - this is OK
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/akis && docker compose run --rm backend pnpm db:migrate" || echo "WARN: Migration failed or no migrations to run (this is often OK if schema is up-to-date)"

      - name: Start services
        run: |
          echo "=== Deploying services ==="
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/akis && docker compose up -d --remove-orphans"
          
          echo ""
          echo "=== Container status ==="
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/akis && docker compose ps"

      - name: Cleanup old images
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "docker image prune -f" || true

      - name: Wait for deployment
        run: sleep 30

      - name: Health check with schema validation
        id: health
        run: |
          for i in {1..30}; do
            HEALTH=$(curl -s -o /dev/null -w "%{http_code}" https://staging.akisflow.com/health || echo "000")
            READY=$(curl -s -o /dev/null -w "%{http_code}" https://staging.akisflow.com/ready || echo "000")
            
            if [ "$HEALTH" = "200" ] && [ "$READY" = "200" ]; then
              echo "HTTP status checks passed!"
              
              # Validate response schemas
              echo "Validating response schemas..."
              
              HEALTH_RESPONSE=$(curl -sf https://staging.akisflow.com/health)
              if echo "$HEALTH_RESPONSE" | grep -q '"status"'; then
                echo "✅ /health schema valid"
              else
                echo "❌ /health response missing required 'status' field"
                exit 1
              fi
              
              READY_RESPONSE=$(curl -sf https://staging.akisflow.com/ready)
              if echo "$READY_RESPONSE" | grep -q '"ready"'; then
                echo "✅ /ready schema valid"
              else
                echo "❌ /ready response missing required 'ready' field"
                exit 1
              fi
              
              VERSION_RESPONSE=$(curl -sf https://staging.akisflow.com/version)
              if echo "$VERSION_RESPONSE" | grep -q '"version"'; then
                echo "✅ /version schema valid"
              else
                echo "❌ /version response missing required 'version' field"
                exit 1
              fi
              
              echo "health_status=success" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            echo "Attempt $i/30: health=$HEALTH, ready=$READY"
            sleep 5
          done
          
          echo "Health checks failed after 30 attempts"
          echo "health_status=failure" >> $GITHUB_OUTPUT
          exit 1

      - name: Verify deployed version
        if: steps.health.outputs.health_status == 'success'
        run: |
          DEPLOYED=$(curl -s https://staging.akisflow.com/version | jq -r '.commit')
          EXPECTED="${{ needs.build.outputs.commit }}"
          
          if [ "$DEPLOYED" = "$EXPECTED" ]; then
            echo "✅ Version verified: $DEPLOYED"
          else
            echo "❌ Version mismatch: deployed=$DEPLOYED, expected=$EXPECTED"
            exit 1
          fi

      - name: Rollback on failure
        if: failure() && steps.previous.outputs.previous_image != 'none'
        run: |
          echo "⚠️ Deployment failed, attempting rollback to previous version..."
          echo "Previous image: ${{ steps.previous.outputs.previous_image }}"
          
          # Extract the tag from the previous image (e.g., ghcr.io/.../akis-backend:abc123 -> abc123)
          PREV_TAG=$(echo "${{ steps.previous.outputs.previous_image }}" | sed 's/.*://')
          echo "Rollback target tag: $PREV_TAG"
          
          # Update .env with previous version and restart
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/akis && sed -i 's/^BACKEND_VERSION=.*/BACKEND_VERSION=${PREV_TAG}/' .env && docker compose pull && docker compose up -d backend"
          
          echo "Rollback initiated. Check staging.akisflow.com/health manually."

      - name: Collect diagnostic logs
        if: always()
        run: |
          echo "=== Collecting diagnostic logs ===" > deploy-logs.txt
          echo "" >> deploy-logs.txt
          
          echo "=== Container Status ===" >> deploy-logs.txt
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/akis && docker compose ps -a" >> deploy-logs.txt 2>&1 || true
          echo "" >> deploy-logs.txt
          
          echo "=== Backend Container Logs (last 200 lines) ===" >> deploy-logs.txt
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/akis && docker compose logs --tail=200 backend" >> deploy-logs.txt 2>&1 || true
          echo "" >> deploy-logs.txt
          
          echo "=== Caddy Container Logs (last 50 lines) ===" >> deploy-logs.txt
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/akis && docker compose logs --tail=50 caddy" >> deploy-logs.txt 2>&1 || true
          echo "" >> deploy-logs.txt
          
          echo "=== Database Container Logs (last 50 lines) ===" >> deploy-logs.txt
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/akis && docker compose logs --tail=50 db" >> deploy-logs.txt 2>&1 || true
          echo "" >> deploy-logs.txt
          
          echo "=== Local Health Check (from server) ===" >> deploy-logs.txt
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "curl -sf http://localhost:3000/health 2>&1 || echo 'Backend not responding on localhost:3000'" >> deploy-logs.txt 2>&1 || true
          echo "" >> deploy-logs.txt
          
          echo "=== Docker Network Inspection ===" >> deploy-logs.txt
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "docker network inspect akis-staging_staging-network 2>&1 | head -50" >> deploy-logs.txt 2>&1 || true
          
          echo "Diagnostic logs collected."

      - name: Upload deployment logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-deploy-logs-${{ github.run_number }}
          path: deploy-logs.txt
          retention-days: 7

  # ============================================================================
  # Post-Deploy Notification
  # ============================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()

    steps:
      - name: Create deployment summary
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "## ✅ Staging Deployment Successful" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Staging Deployment Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ needs.build.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ needs.build.outputs.commit }} |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://staging.akisflow.com |" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
