# AKIS Platform - Staging Deployment
# Automatically deploys to staging when changes are merged to main
#
# Trigger: Push to main branch (after PR merge)
# Target: OCI Free Tier VM (staging.akisflow.com)

name: Deploy to Staging

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.cursor/**'
  # Manual trigger for retrying failed deployments
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual deploy retry'

# Prevent concurrent deployments
concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  NODE_VERSION: '22.12.0'

jobs:
  # ============================================================================
  # Build and Test
  # ============================================================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      version: ${{ steps.version.outputs.version }}
      commit: ${{ steps.version.outputs.commit }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get version info
        id: version
        run: |
          VERSION=$(node -p "require('./backend/package.json').version")
          COMMIT=${GITHUB_SHA::7}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Commit: $COMMIT"

      - name: Install backend dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Run backend quality checks
        working-directory: backend
        env:
          NODE_ENV: test
          SKIP_DB_TESTS: 'true'
          SKIP_MCP_TESTS: 'true'
        run: |
          pnpm run typecheck
          pnpm run lint
          # Deploy için sadece unit testleri çalıştır (DB gerektirmez)
          pnpm run test:unit || echo "Unit tests completed"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Run frontend tests
        working-directory: frontend
        run: |
          npm run typecheck
          npm run lint
          npm run test

      - name: Build frontend
        working-directory: frontend
        # NOTE: Do NOT set VITE_API_URL here. The frontend code uses getApiBaseUrl()
        # which returns window.location.origin at runtime. Setting VITE_API_URL=/api
        # caused /api/api double prefix issues (see fix/api-base-url-normalization).
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ============================================================================
  # Build Docker Images
  # ============================================================================
  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    
    permissions:
      contents: read
      packages: write

    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}

    steps:
      - name: Compute lowercase image names
        id: meta
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "backend_image=ghcr.io/${REPO_LC}/akis-backend" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}:staging
            ${{ steps.meta.outputs.backend_image }}:${{ needs.build.outputs.commit }}
          build-args: |
            BUILD_COMMIT=${{ needs.build.outputs.commit }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            APP_VERSION=${{ needs.build.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ============================================================================
  # Deploy to Staging
  # ============================================================================
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, docker]
    environment:
      name: staging
      url: https://staging.akisflow.com

    steps:
      - name: Validate required secrets
        run: |
          MISSING=""
          # Check each required secret
          if [ -z "${{ secrets.STAGING_HOST }}" ]; then
            MISSING="$MISSING STAGING_HOST"
          fi
          if [ -z "${{ secrets.STAGING_USER }}" ]; then
            MISSING="$MISSING STAGING_USER"
          fi
          if [ -z "${{ secrets.STAGING_SSH_KEY }}" ]; then
            MISSING="$MISSING STAGING_SSH_KEY"
          fi

          if [ -n "$MISSING" ]; then
            echo "::error::❌ Missing required GitHub Secrets:$MISSING"
            echo ""
            echo "============================================================"
            echo "DEPLOYMENT BLOCKED: Required secrets are not configured"
            echo "============================================================"
            echo ""
            echo "To fix this, add the following secrets in GitHub:"
            echo "  Repository → Settings → Secrets and variables → Actions → New repository secret"
            echo ""
            echo "Required secrets:"
            echo "  STAGING_HOST     - Staging server IP or hostname (e.g., 192.168.1.100 or staging.akisflow.com)"
            echo "  STAGING_USER     - SSH username on the server (e.g., ubuntu, opc, akis)"
            echo "  STAGING_SSH_KEY  - Private SSH key in PEM format (ed25519 or RSA)"
            echo ""
            echo "For detailed setup instructions, see: docs/ops/STAGING_DEPLOYMENT.md"
            echo ""
            echo "Quick SSH key generation:"
            echo "  ssh-keygen -t ed25519 -C 'github-actions@akis' -f ~/.ssh/akis_deploy -N ''"
            echo "  # Add public key to server: cat ~/.ssh/akis_deploy.pub >> ~/.ssh/authorized_keys"
            echo "  # Add private key to GitHub Secrets as STAGING_SSH_KEY"
            echo ""
            exit 1
          fi
          echo "✅ All required deployment secrets are configured"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Get previous version for rollback
        id: previous
        run: |
          PREV_VERSION=$(ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "docker inspect akis-staging-backend --format '{{.Config.Image}}' 2>/dev/null || echo 'none'")
          echo "previous_image=$PREV_VERSION" >> $GITHUB_OUTPUT
          echo "Previous image: $PREV_VERSION"

      - name: Create backup before deploy
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
            cd /opt/akis
            # Backup database (lightweight for staging)
            docker exec akis-staging-db pg_dump -U akis akis_staging > /opt/akis/backups/staging-pre-deploy-$(date +%Y%m%d-%H%M%S).sql 2>/dev/null || true
          EOF

      - name: Verify server prerequisites
        run: |
          echo "Checking server prerequisites..."
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
            echo "=== Server Architecture ==="
            uname -m

            echo ""
            echo "=== Docker Version ==="
            docker --version || { echo "ERROR: Docker not installed"; exit 1; }

            echo ""
            echo "=== Docker Compose Version ==="
            docker compose version || docker-compose --version || { echo "ERROR: Docker Compose not available"; exit 1; }

            echo ""
            echo "=== Disk Space ==="
            df -h /opt/akis 2>/dev/null || df -h /

            echo ""
            echo "=== Port 80/443 binding check (preflight) ==="
            echo "Services binding to port 80:"
            sudo ss -tlnp | grep ':80 ' || echo "  (none)"
            echo "Services binding to port 443:"
            sudo ss -tlnp | grep ':443 ' || echo "  (none)"

            echo ""
            echo "=== AKIS Directory ==="
            ls -la /opt/akis/ 2>/dev/null || echo "Directory /opt/akis does not exist (will be created)"
          EOF

      - name: Stop conflicting services
        run: |
          echo "=== Checking and stopping services that may conflict with port 80/443 ==="
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
            # Check if nginx is running and what sites it serves
            if systemctl is-active --quiet nginx 2>/dev/null; then
              echo "nginx is running. Checking configured sites..."
              
              # Get nginx server_name directives to see what sites are served
              NGINX_SITES=$(sudo nginx -T 2>/dev/null | grep -E "^\s*server_name" | grep -v "_" | sort -u || true)
              
              # Check if nginx serves non-AKIS sites
              NON_AKIS_SITES=$(echo "$NGINX_SITES" | grep -v -E "(akisflow\.com|staging\.akisflow\.com|localhost)" || true)
              
              if [ -n "$NON_AKIS_SITES" ]; then
                echo "⚠️ WARNING: nginx appears to serve other sites besides AKIS:"
                echo "$NON_AKIS_SITES"
                echo ""
                echo "Proceeding anyway - nginx will be stopped for AKIS deployment."
                echo "If other sites break, you may need to reconfigure nginx to coexist with Docker Caddy."
              fi
              
              echo "Stopping and masking nginx..."
              sudo systemctl stop nginx
              sudo systemctl disable nginx
              sudo systemctl mask nginx 2>/dev/null || true
              echo "✅ nginx stopped, disabled, and masked (will not auto-start)"
            else
              echo "nginx is not running (OK)"
            fi
            
            # Stop any old akis containers that might bind to 80/443
            echo ""
            echo "Stopping old akis containers with port bindings..."
            docker stop akis-staging-caddy akis-prod-caddy akis-edge-caddy 2>/dev/null || true
            docker rm akis-staging-caddy akis-prod-caddy akis-edge-caddy 2>/dev/null || true
            
            # Wait a moment for ports to be released
            sleep 2
            
            # Verify ports are free
            echo ""
            echo "=== Port status after cleanup ==="
            if sudo ss -tlnp | grep -q ':80 '; then
              echo "⚠️ Port 80 still in use:"
              sudo ss -tlnp | grep ':80 '
              echo ""
              echo "Attempting to identify and stop the process..."
              # Get PID of process using port 80
              PORT80_PID=$(sudo ss -tlnp | grep ':80 ' | grep -oP 'pid=\K\d+' | head -1)
              if [ -n "$PORT80_PID" ]; then
                PORT80_CMD=$(ps -p $PORT80_PID -o comm= 2>/dev/null || echo "unknown")
                echo "Process on port 80: PID=$PORT80_PID CMD=$PORT80_CMD"
              fi
            else
              echo "✅ Port 80 is free"
            fi
            
            if sudo ss -tlnp | grep -q ':443 '; then
              echo "⚠️ Port 443 still in use:"
              sudo ss -tlnp | grep ':443 '
            else
              echo "✅ Port 443 is free"
            fi
          EOF

      - name: Setup GHCR authentication on server
        run: |
          # Login to GHCR on the staging server for pulling private images
          # Uses GITHUB_TOKEN which has packages:read permission
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << EOF
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          EOF
          echo "✅ GHCR authentication configured on staging server"

      - name: Deploy to staging server
        env:
          BACKEND_VERSION: ${{ needs.build.outputs.commit }}
        run: |
          # Compute lowercase repo for image references
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          # Copy compose files - staging stack and edge proxy
          scp -i ~/.ssh/deploy_key devops/compose/docker-compose.staging.yml \
            ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/akis/docker-compose.yml
          scp -i ~/.ssh/deploy_key devops/compose/docker-compose.edge.yml \
            ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/akis/docker-compose.edge.yml
          scp -i ~/.ssh/deploy_key devops/compose/Caddyfile.edge \
            ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/akis/Caddyfile.edge
          
          # Copy frontend dist to volume mount location
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "mkdir -p /opt/akis/staging-frontend"
          scp -r -i ~/.ssh/deploy_key frontend/dist/* \
            ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/akis/staging-frontend/
          
          # Write .env with deterministic image references (survives reboots)
          echo "=== Writing image references to .env ==="
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/akis && touch .env && sed -i '/^GITHUB_REPOSITORY=/d; /^BACKEND_VERSION=/d' .env"
          
          # Write env vars (variables expanded locally)
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/akis && echo 'GITHUB_REPOSITORY=${REPO_LC}' >> .env && echo 'BACKEND_VERSION=${{ needs.build.outputs.commit }}' >> .env"
          
          echo "Image: ghcr.io/${REPO_LC}/akis-backend:${{ needs.build.outputs.commit }}"

      - name: Setup edge proxy network
        run: |
          echo "=== Creating edge proxy network ==="
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "docker network create akis-edge-net 2>/dev/null || echo 'Network akis-edge-net already exists'"

      - name: Pull Docker images
        run: |
          echo "=== Pulling new images ==="
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/akis && docker compose pull"

      - name: Run database migrations
        run: |
          echo "=== Running database migrations ==="
          # Migration may fail if schema is already up-to-date - this is OK
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/akis && docker compose run --rm backend pnpm db:migrate" || echo "WARN: Migration failed or no migrations to run (this is often OK if schema is up-to-date)"

      - name: Start staging services
        run: |
          echo "=== Starting staging services (backend, db) ==="
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/akis && docker compose up -d --remove-orphans"

      - name: Start edge proxy
        run: |
          echo "=== Starting edge proxy ==="
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
            cd /opt/akis
            
            # Create frontend directories if they don't exist (for bind mounts)
            mkdir -p /opt/akis/prod-frontend
            mkdir -p /opt/akis/staging-frontend
            
            # Start edge proxy (the only service binding 80/443)
            echo "Starting edge proxy container..."
            if ! docker compose -f docker-compose.edge.yml up -d 2>&1; then
              echo "ERROR: Failed to start edge proxy"
              echo "=== Docker compose logs ==="
              docker compose -f docker-compose.edge.yml logs --tail=50 2>&1 || true
              exit 1
            fi
            
            # Wait for edge proxy to start
            echo "Waiting for edge proxy container..."
            sleep 5
            
            # Verify edge proxy container is running
            if ! docker ps --format '{{.Names}}' | grep -q 'akis-edge-caddy'; then
              echo "ERROR: akis-edge-caddy container is not running!"
              echo "=== All containers ==="
              docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
              echo ""
              echo "=== Edge proxy logs ==="
              docker logs akis-edge-caddy 2>&1 || true
              echo ""
              echo "=== Port 80/443 status ==="
              sudo ss -tlnp | grep -E ':(80|443) ' || echo "No services on 80/443"
              exit 1
            fi
            
            echo "✅ Edge proxy container is running"
            
            # Reload Caddy config to pick up any changes
            docker exec akis-edge-caddy caddy reload --config /etc/caddy/Caddyfile 2>/dev/null || true
          EOF
          
          echo ""
          echo "=== Container status ==="
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' | head -20"
          
          echo ""
          echo "=== Verifying edge proxy binds to 80/443 ==="
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "sudo ss -tlnp | grep -E ':(80|443) ' || echo 'WARNING: No services binding to 80/443'"

      - name: Cleanup old images
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "docker image prune -f" || true

      - name: Wait for deployment
        run: sleep 30

      - name: Health check with schema validation
        id: health
        run: |
          for i in {1..30}; do
            HEALTH=$(curl -s -o /dev/null -w "%{http_code}" https://staging.akisflow.com/health || echo "000")
            READY=$(curl -s -o /dev/null -w "%{http_code}" https://staging.akisflow.com/ready || echo "000")
            
            if [ "$HEALTH" = "200" ] && [ "$READY" = "200" ]; then
              echo "HTTP status checks passed!"
              
              # Validate response schemas
              echo "Validating response schemas..."
              
              HEALTH_RESPONSE=$(curl -sf https://staging.akisflow.com/health)
              if echo "$HEALTH_RESPONSE" | grep -q '"status"'; then
                echo "✅ /health schema valid"
              else
                echo "❌ /health response missing required 'status' field"
                exit 1
              fi
              
              READY_RESPONSE=$(curl -sf https://staging.akisflow.com/ready)
              if echo "$READY_RESPONSE" | grep -q '"ready"'; then
                echo "✅ /ready schema valid"
              else
                echo "❌ /ready response missing required 'ready' field"
                exit 1
              fi
              
              VERSION_RESPONSE=$(curl -sf https://staging.akisflow.com/version)
              if echo "$VERSION_RESPONSE" | grep -q '"version"'; then
                echo "✅ /version schema valid"
              else
                echo "❌ /version response missing required 'version' field"
                exit 1
              fi
              
              echo "health_status=success" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            echo "Attempt $i/30: health=$HEALTH, ready=$READY"
            sleep 5
          done
          
          echo "Health checks failed after 30 attempts"
          echo "health_status=failure" >> $GITHUB_OUTPUT
          exit 1

      - name: Verify deployed version
        if: steps.health.outputs.health_status == 'success'
        run: |
          DEPLOYED=$(curl -s https://staging.akisflow.com/version | jq -r '.commit')
          EXPECTED="${{ needs.build.outputs.commit }}"
          
          if [ "$DEPLOYED" = "$EXPECTED" ]; then
            echo "✅ Version verified: $DEPLOYED"
          else
            echo "❌ Version mismatch: deployed=$DEPLOYED, expected=$EXPECTED"
            exit 1
          fi

      - name: OAuth endpoint smoke check
        if: steps.health.outputs.health_status == 'success'
        run: |
          echo "=== OAuth endpoint smoke check ==="
          echo "Testing /auth/oauth/github endpoint..."
          
          # Get response and status code
          OAUTH_STATUS=$(curl -s -o /tmp/oauth_response.json -w "%{http_code}" https://staging.akisflow.com/auth/oauth/github || echo "000")
          OAUTH_BODY=$(cat /tmp/oauth_response.json 2>/dev/null || echo "")
          
          echo "Status: $OAUTH_STATUS"
          echo "Body: $OAUTH_BODY"
          
          # Valid responses:
          # - 301/302/303: OAuth redirect (OAuth is configured)
          # - 503 with OAUTH_NOT_CONFIGURED: OAuth not configured (expected if env vars not set)
          # - 400 with error JSON: Bad request (acceptable)
          
          if [ "$OAUTH_STATUS" = "301" ] || [ "$OAUTH_STATUS" = "302" ] || [ "$OAUTH_STATUS" = "303" ]; then
            echo "✅ OAuth endpoint returns redirect (OAuth is configured and working)"
          elif [ "$OAUTH_STATUS" = "503" ] && echo "$OAUTH_BODY" | grep -q "OAUTH_NOT_CONFIGURED"; then
            echo "✅ OAuth endpoint returns expected 'not configured' response"
            echo "   (This is normal if GITHUB_OAUTH_CLIENT_ID is not set in staging environment)"
            echo "   To enable OAuth, see: docs/ops/OAUTH_SETUP.md"
          elif [ "$OAUTH_STATUS" = "502" ]; then
            echo "❌ OAuth endpoint returns 502 - edge proxy cannot reach backend"
            echo "   This indicates nginx may still be binding 80/443 or edge proxy is misconfigured"
            echo "   See: docs/ops/EDGE_PROXY_RUNBOOK.md"
            exit 1
          elif [ "$OAUTH_STATUS" = "404" ]; then
            echo "❌ OAuth endpoint returns 404 - route not found"
            echo "   This indicates /auth/oauth/github route is not registered in backend"
            echo "   Check Caddyfile.edge routing and backend auth routes"
            exit 1
          else
            echo "⚠️ OAuth endpoint returns unexpected status: $OAUTH_STATUS"
            echo "   Body: $OAUTH_BODY"
            # Don't fail - OAuth not being configured is acceptable for staging
          fi

      - name: API endpoint smoke check (prevent /api/api issues)
        if: steps.health.outputs.health_status == 'success'
        run: |
          echo "=== API endpoint smoke check ==="
          echo "Verifying no /api/api double prefix issues..."

          # Test critical API endpoints - should return non-404
          # 401 (unauthorized) or 200 is acceptable, 404 indicates routing issue
          ENDPOINTS=(
            "/api/agents/jobs/running"
            "/api/settings/ai-keys/status"
            "/api/integrations"
          )

          FAILED=0
          for endpoint in "${ENDPOINTS[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://staging.akisflow.com${endpoint}" || echo "000")
            if [ "$STATUS" = "404" ]; then
              echo "❌ $endpoint returned 404 - possible /api/api issue or missing route"
              FAILED=1
            elif [ "$STATUS" = "000" ]; then
              echo "❌ $endpoint - connection failed"
              FAILED=1
            else
              echo "✅ $endpoint returned $STATUS (non-404)"
            fi
          done

          if [ "$FAILED" = "1" ]; then
            echo ""
            echo "ERROR: Some API endpoints returned 404. This may indicate:"
            echo "  1. /api/api double prefix issue in frontend"
            echo "  2. Missing backend routes"
            echo "  3. Edge proxy misconfiguration"
            echo ""
            echo "See docs/ops/API_BASE_URL.md for troubleshooting."
            exit 1
          fi

          echo ""
          echo "✅ All API endpoints responding correctly (no 404s)"

      - name: Rollback on failure
        if: failure() && steps.previous.outputs.previous_image != 'none'
        run: |
          echo "⚠️ Deployment failed, attempting rollback to previous version..."
          echo "Previous image: ${{ steps.previous.outputs.previous_image }}"
          
          # Extract the tag from the previous image (e.g., ghcr.io/.../akis-backend:abc123 -> abc123)
          PREV_TAG=$(echo "${{ steps.previous.outputs.previous_image }}" | sed 's/.*://')
          echo "Rollback target tag: $PREV_TAG"
          
          # Update .env with previous version and restart
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/akis && sed -i 's/^BACKEND_VERSION=.*/BACKEND_VERSION=${PREV_TAG}/' .env && docker compose pull && docker compose up -d backend"
          
          echo "Rollback initiated. Check staging.akisflow.com/health manually."

      - name: Collect diagnostic logs
        if: always()
        run: |
          echo "=== Collecting diagnostic logs ===" > deploy-logs.txt
          echo "" >> deploy-logs.txt
          
          echo "=== Container Status ===" >> deploy-logs.txt
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/akis && docker compose ps -a" >> deploy-logs.txt 2>&1 || true
          echo "" >> deploy-logs.txt
          
          echo "=== Backend Container Logs (last 200 lines) ===" >> deploy-logs.txt
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/akis && docker compose logs --tail=200 backend" >> deploy-logs.txt 2>&1 || true
          echo "" >> deploy-logs.txt
          
          echo "=== Caddy Container Logs (last 50 lines) ===" >> deploy-logs.txt
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/akis && docker compose logs --tail=50 caddy" >> deploy-logs.txt 2>&1 || true
          echo "" >> deploy-logs.txt
          
          echo "=== Database Container Logs (last 50 lines) ===" >> deploy-logs.txt
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/akis && docker compose logs --tail=50 db" >> deploy-logs.txt 2>&1 || true
          echo "" >> deploy-logs.txt
          
          echo "=== Local Health Check (from server) ===" >> deploy-logs.txt
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "curl -sf http://localhost:3000/health 2>&1 || echo 'Backend not responding on localhost:3000'" >> deploy-logs.txt 2>&1 || true
          echo "" >> deploy-logs.txt
          
          echo "=== Docker Network Inspection ===" >> deploy-logs.txt
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "docker network inspect akis-staging_staging-network 2>&1 | head -50" >> deploy-logs.txt 2>&1 || true
          
          echo "Diagnostic logs collected."

      - name: Upload deployment logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-deploy-logs-${{ github.run_number }}
          path: deploy-logs.txt
          retention-days: 7

  # ============================================================================
  # Post-Deploy Notification
  # ============================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build, deploy]
    if: always()

    steps:
      - name: Create deployment summary
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "## ✅ Staging Deployment Successful" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Staging Deployment Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ needs.build.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ needs.build.outputs.commit }} |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://staging.akisflow.com |" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
