name: PR Gate

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install backend dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Backend Typecheck
        working-directory: backend
        run: pnpm run typecheck

      - name: Backend Lint
        working-directory: backend
        run: pnpm run lint

      - name: Backend Unit Tests
        working-directory: backend
        env:
          NODE_ENV: test
          SKIP_DB_TESTS: 'true'
          SKIP_MCP_TESTS: 'true'
        run: pnpm run test:unit

  frontend-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Frontend Typecheck
        working-directory: frontend
        run: pnpm run typecheck

      - name: Frontend Lint
        working-directory: frontend
        run: pnpm run lint

      - name: Frontend Tests
        working-directory: frontend
        run: pnpm test

      - name: Frontend Build
        working-directory: frontend
        run: pnpm build

  summary:
    runs-on: ubuntu-latest
    needs: [backend-gate, frontend-gate]
    if: always()
    steps:
      - name: PR Gate Summary
        run: |
          echo "## PR Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.backend-gate.result }}" == "success" ] && [ "${{ needs.frontend-gate.result }}" == "success" ]; then
            echo "✅ All quality gates passed" >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "❌ Some quality gates failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- Backend: ${{ needs.backend-gate.result }}" >> $GITHUB_STEP_SUMMARY
            echo "- Frontend: ${{ needs.frontend-gate.result }}" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

