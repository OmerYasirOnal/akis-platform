name: PR Gate

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: akis_v2_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install backend dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Wait for Postgres
        run: |
          until nc -z 127.0.0.1 5432; do echo "waiting for pg..."; sleep 1; done

      - name: Run database migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/akis_v2_test
        run: pnpm db:migrate

      - name: Backend Typecheck
        working-directory: backend
        run: pnpm run typecheck

      - name: Backend Lint
        working-directory: backend
        run: pnpm run lint

      - name: Backend Tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/akis_v2_test
          NODE_ENV: test
        run: pnpm run test:ci > backend-tests.log 2>&1 || (cat backend-tests.log && exit 1)
      
      - name: Upload Backend Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-logs
          path: backend/backend-tests.log
          retention-days: 7

  frontend-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Frontend Typecheck
        working-directory: frontend
        run: pnpm run typecheck

      - name: Frontend Lint
        working-directory: frontend
        run: pnpm run lint

      - name: Frontend Tests
        working-directory: frontend
        run: pnpm test

      - name: Frontend Build
        working-directory: frontend
        run: pnpm build

  summary:
    runs-on: ubuntu-latest
    needs: [backend-gate, frontend-gate]
    if: always()
    steps:
      - name: PR Gate Summary
        run: |
          echo "## PR Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.backend-gate.result }}" == "success" ] && [ "${{ needs.frontend-gate.result }}" == "success" ]; then
            echo "✅ All quality gates passed" >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "❌ Some quality gates failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- Backend: ${{ needs.backend-gate.result }}" >> $GITHUB_STEP_SUMMARY
            echo "- Frontend: ${{ needs.frontend-gate.result }}" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

