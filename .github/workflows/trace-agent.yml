name: Trace Agent CI

on:
  pull_request:
    paths:
      - 'backend/src/agents/trace/**'
      - 'backend/src/services/trace/**'
      - 'backend/src/services/knowledge/verification/**'
      - 'backend/src/config/agentRiskProfiles.ts'
      - 'backend/src/core/orchestrator/AgentOrchestrator.ts'
      - 'backend/src/api/agents.ts'
      - 'backend/test/unit/trace-*.test.ts'
      - 'backend/test/unit/flaky-test-manager.test.ts'
      - 'backend/test/unit/agent-verification-service.test.ts'
      - 'frontend/src/pages/dashboard/agents/trace/**'
      - 'frontend/src/services/api/**'
      - 'frontend/src/i18n/locales/en.json'
      - 'frontend/src/i18n/locales/tr.json'
      - 'frontend/playwright.config.ts'
      - '.github/workflows/trace-agent.yml'
  workflow_dispatch:

jobs:
  trace-unit:
    name: Trace Unit Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install backend dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Backend typecheck
        working-directory: backend
        run: pnpm typecheck

      - name: Backend trace-focused tests
        working-directory: backend
        run: |
          NODE_ENV=test SKIP_MCP_TESTS=true SKIP_DB_TESTS=true node --test --import dotenv/config --import tsx \
            test/unit/trace-agent-determinism.test.ts \
            test/unit/trace-agent-execution.test.ts \
            test/unit/trace-coverage-model.test.ts \
            test/unit/flaky-test-manager.test.ts \
            test/unit/agent-verification-service.test.ts \
            test/unit/agents-validation.test.ts

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Frontend typecheck
        working-directory: frontend
        run: pnpm typecheck

      - name: Frontend trace page tests
        working-directory: frontend
        run: pnpm test -- src/pages/dashboard/agents/trace/__tests__/DashboardAgentTracePage.test.tsx

  trace-playwright:
    name: Trace Playwright (Manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright with CI defaults
        working-directory: frontend
        run: pnpm test:e2e -- --workers=1

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trace-playwright-artifacts
          path: |
            frontend/playwright-report/**
            frontend/test-results/playwright/**
            frontend/test-results/**
