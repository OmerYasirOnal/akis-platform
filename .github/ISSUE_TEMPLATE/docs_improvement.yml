name: "Documentation improvement"
description: Propose improvements to documentation
title: "docs: <short title>"
labels: ["documentation", "enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve our documentation! Please describe what's missing or unclear.

  - type: textarea
    id: context
    attributes:
      label: What's missing or unclear?
      description: Describe the documentation issue and propose a fix.
      placeholder: |
        Example:
        - The Getting Started guide doesn't explain how to configure GitHub App
        - The API documentation is missing the /api/agent/scribe/run endpoint
        - The Architecture diagram is outdated
    validations:
      required: true

  - type: dropdown
    id: doc_type
    attributes:
      label: Documentation Type
      description: What type of documentation needs improvement?
      options:
        - README
        - Getting Started Guide
        - Architecture
        - API Reference
        - Contributing Guide
        - Other
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution
      description: If you have specific suggestions, describe them here.
      placeholder: Add a section about X, clarify Y, add example Z...

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Are you willing to contribute this improvement?
      options:
        - label: I'm willing to submit a PR for this improvement
          required: false

