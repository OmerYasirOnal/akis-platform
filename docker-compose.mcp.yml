# AKIS - GitHub MCP Gateway Docker Compose
# Provides local HTTP-to-stdio bridge for GitHub MCP Server
#
# Usage:
#   docker compose -f docker-compose.mcp.yml up -d
#   docker compose -f docker-compose.mcp.yml down
#   OR: ./scripts/mcp-up.sh / ./scripts/mcp-down.sh
#
# Requirements:
#   - Create .env.mcp.local from env.mcp.local.example
#   - Add your GITHUB_TOKEN to .env.mcp.local
#
# IMPORTANT: GITHUB_TOKEN is loaded ONLY from env_file (.env.mcp.local).
# Do NOT add GITHUB_TOKEN to the environment section below - it would override
# the env_file value with an empty string if not set in your shell.
#
# Note: Uses explicit project name 'akis-mcp' to avoid conflicts with other compose stacks
# Set via: COMPOSE_PROJECT_NAME=akis-mcp (handled by scripts)

services:
  # GitHub MCP Gateway - HTTP endpoint for AKIS backend
  akis-github-mcp-gateway:
    build:
      context: ./mcp-gateway
      dockerfile: Dockerfile
    container_name: akis-github-mcp-gateway
    # SECRETS: Loaded from .env.mcp.local (gitignored)
    # Contains GITHUB_TOKEN - the single source of truth for this secret.
    # Never add GITHUB_TOKEN to the 'environment' section below.
    # 
    # To use a custom env file, set COMPOSE_ENV_FILE environment variable
    # before running docker compose, or use scripts/mcp-up.sh --mcp-env-file
    env_file:
      - ${COMPOSE_ENV_FILE:-.env.mcp.local}
    ports:
      - "4010:4010"
    # NON-SECRET configuration only - safe defaults, no token interpolation
    environment:
      - MCP_GATEWAY_PORT=4010
      - MCP_GATEWAY_HOST=0.0.0.0
      - LOG_LEVEL=info
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4010/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - akis-mcp

networks:
  akis-mcp:
    name: akis-mcp-network
    driver: bridge

