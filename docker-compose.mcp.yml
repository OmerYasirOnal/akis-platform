# AKIS - GitHub MCP Gateway Docker Compose
# Provides local HTTP-to-stdio bridge for GitHub MCP Server
#
# Usage:
#   docker compose -f docker-compose.mcp.yml up -d
#   docker compose -f docker-compose.mcp.yml down
#   OR: ./scripts/mcp-up.sh / ./scripts/mcp-down.sh
#
# Requirements:
#   - GITHUB_TOKEN in .env or exported in shell
#
# Note: Uses explicit project name 'akis-mcp' to avoid conflicts with other compose stacks
# Set via: COMPOSE_PROJECT_NAME=akis-mcp (handled by scripts)

services:
  # GitHub MCP Gateway - HTTP endpoint for AKIS backend
  akis-github-mcp-gateway:
    build:
      context: ./mcp-gateway
      dockerfile: Dockerfile
    container_name: akis-github-mcp-gateway
    ports:
      - "${MCP_GATEWAY_PORT:-4010}:4010"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - MCP_GATEWAY_PORT=4010
      - MCP_GATEWAY_HOST=0.0.0.0
      - LOG_LEVEL=${MCP_LOG_LEVEL:-info}
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4010/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - akis-mcp

networks:
  akis-mcp:
    name: akis-mcp-network
    driver: bridge

