# docker-compose.llm.local.yml
# Local LLM + RAG Infrastructure for AKIS Platform
# 
# Services:
# - localai: OpenAI-compatible inference server (CPU-optimized)
# - qdrant: Vector database for RAG (Phase 2)
#
# Usage:
#   docker compose -f docker-compose.llm.local.yml up -d
#   docker compose -f docker-compose.llm.local.yml down
#
# Security: Internal network only, no public ports beyond localhost

version: '3.8'

services:
  # LocalAI - OpenAI-compatible local inference
  # Docs: https://localai.io/
  localai:
    image: quay.io/go-skynet/local-ai:latest
    container_name: akis-localai
    ports:
      - "8080:8080"
    environment:
      - DEBUG=false
      - THREADS=4
      - CONTEXT_SIZE=2048
      # Enable CORS for local dev (restrict in production)
      - CORS_ALLOW_ORIGINS=http://localhost:3000,http://localhost:5173
    volumes:
      # Model files should be downloaded separately (see docs/QA_EVIDENCE_LOCAL_LLM_CONTRACT.md)
      - ./data/localai/models:/models:cached
      # Persistent cache for embeddings, etc.
      - ./data/localai/cache:/build/models:cached
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - akis-llm-local

  # Qdrant - Vector database for RAG
  # Docs: https://qdrant.tech/documentation/
  qdrant:
    image: qdrant/qdrant:latest
    container_name: akis-qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC (optional)
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      # Disable telemetry in local dev
      - QDRANT__TELEMETRY_DISABLED=true
    volumes:
      # Persistent storage for vector collections
      - ./data/qdrant/storage:/qdrant/storage:cached
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - akis-llm-local

networks:
  akis-llm-local:
    name: akis-llm-local
    driver: bridge

# Note: Model weights are NOT included in git.
# Download instructions in docs/QA_EVIDENCE_LOCAL_LLM_CONTRACT.md

