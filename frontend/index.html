<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#07D1AF" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AKIS" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="AKIS Platform - AI Agent Workflow Engine for Software Development" />
    <title>AKIS Platform</title>

    <!-- Fonts: DM Sans + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Favicon Set (canonical: /brand/* per BRAND_GUIDE.md) -->
    <!-- Note: Production resolves to https://<DOMAIN>/brand/... -->
    <link rel="icon" type="image/x-icon" href="/brand/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/brand/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/brand/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/brand/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/brand/android-chrome-512x512.png" />
    
    <!-- Open Graph Meta Tags (canonical: /brand/og-image.png) -->
    <meta property="og:title" content="AKIS Platform - AI Agents for Software Development Automation" />
    <meta property="og:description" content="Autonomous AI agents that document, test, and build—so your team can focus on what truly matters. Integrate with GitHub, Jira, and Confluence in minutes." />
    <meta property="og:image" content="/brand/og-image.png" />
    <meta property="og:url" content="https://akis.dev" />
    <meta property="og:type" content="website" />
    
    <!-- Twitter Card Meta Tags (canonical: /brand/twitter-card.png) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AKIS Platform - AI Development Automation" />
    <meta name="twitter:description" content="Autonomous agents for docs, tests, and MVPs. Free beta access." />
    <meta name="twitter:image" content="/brand/twitter-card.png" />
    <script>
      (function () {
        const storageKey = "akis:theme";
        const classNameDark = "dark";
        const root = document.documentElement;

        try {
          const stored = window.localStorage.getItem(storageKey);
          const systemPrefersDark = window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          const resolved =
            stored === "dark" || stored === "light"
              ? stored
              : "light";

          root.dataset.theme = resolved;
          if (resolved === "dark") {
            root.classList.add(classNameDark);
          } else {
            root.classList.remove(classNameDark);
          }
        } catch {
          root.dataset.theme = "dark";
          root.classList.add(classNameDark);
        }
      })();
    </script>
    <style>
      /* Prevent flash of unstyled content */
      body {
        background-color: #f8f9fb;
        color: #1f2328;
      }
    </style>
  </head>
  <body class="min-h-screen">
    <div id="root" class="min-h-screen"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
