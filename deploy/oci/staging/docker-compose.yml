# AKIS Platform - Staging Docker Compose
# =========================================================================
#
# Single VM deployment for OCI Free Tier staging environment
#
# Usage:
#   docker compose up -d                    # Start all services (incl. MCP gateway)
#   docker compose logs -f                  # View logs
#   docker compose down                     # Stop services
#
# PROMOTION TO PRODUCTION:
# - Change image tags from :staging to specific version
# - Update resource limits if needed
# - Use production-specific .env file
# - Consider separate volume names (akis-prod-*)
#
# =========================================================================

name: akis-staging

services:
  # =========================================================================
  # Reverse Proxy - Caddy
  # =========================================================================
  # Handles: HTTPS termination, static file serving, API routing
  # =========================================================================
  caddy:
    image: caddy:2-alpine
    container_name: akis-staging-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      ACME_EMAIL: ${ACME_EMAIL:-admin@akisflow.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - ./frontend:/srv/frontend:ro
    networks:
      - akis-staging
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.Name}}"

  # =========================================================================
  # Backend API - Fastify
  # =========================================================================
  # Handles: REST API, agent orchestration, authentication
  # Entrypoint: pnpm start (runs compiled dist/server.js)
  # =========================================================================
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-omeryasironal/akis-platform-devolopment}/akis-backend:${BACKEND_VERSION:-staging}
    container_name: akis-staging-backend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      # Core
      NODE_ENV: production
      PORT: "3000"
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      
      # Database
      DATABASE_URL: ${DATABASE_URL}
      
      # Authentication
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-akis_session}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
      AUTH_COOKIE_MAXAGE: ${AUTH_COOKIE_MAXAGE:-604800}
      
      # URLs
      BACKEND_URL: ${BACKEND_URL:-https://staging.akisflow.com}
      FRONTEND_URL: ${FRONTEND_URL:-https://staging.akisflow.com}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://staging.akisflow.com}
      
      # Rate limiting
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-200}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-60000}
      
      # Email
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-mock}
      EMAIL_VERIFICATION_TOKEN_TTL_MINUTES: ${EMAIL_VERIFICATION_TOKEN_TTL_MINUTES:-15}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      # SMTP (used when EMAIL_PROVIDER=smtp)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-AKIS Platform}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_REPLY_TO: ${SMTP_REPLY_TO:-}
      PUBLIC_LOGO_URL: ${PUBLIC_LOGO_URL:-}
      
      # AI Service
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      AI_API_KEY: ${AI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_MODEL_DEFAULT: ${AI_MODEL_DEFAULT:-}
      AI_MODEL_PLANNER: ${AI_MODEL_PLANNER:-}
      AI_MODEL_VALIDATION: ${AI_MODEL_VALIDATION:-}
      AI_KEY_ENCRYPTION_KEY: ${AI_KEY_ENCRYPTION_KEY:-}
      AI_KEY_ENCRYPTION_KEY_VERSION: ${AI_KEY_ENCRYPTION_KEY_VERSION:-v1}
      AI_DETERMINISTIC_MODE: ${AI_DETERMINISTIC_MODE:-false}
      
      # Reverse proxy (Caddy terminates TLS; backend must trust X-Forwarded-* headers)
      TRUST_PROXY: ${TRUST_PROXY:-true}

      # OAuth
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      ATLASSIAN_OAUTH_CLIENT_ID: ${ATLASSIAN_OAUTH_CLIENT_ID:-}
      ATLASSIAN_OAUTH_CLIENT_SECRET: ${ATLASSIAN_OAUTH_CLIENT_SECRET:-}
      
      # MCP Gateway (default: Docker internal service name for staging)
      GITHUB_MCP_BASE_URL: ${GITHUB_MCP_BASE_URL:-http://mcp-gateway:4010/mcp}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      MCP_ATLASSIAN_ENABLED: ${MCP_ATLASSIAN_ENABLED:-false}
      
    networks:
      - akis-staging
    depends_on:
      db:
        condition: service_healthy
      mcp-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.Name}}"

  # =========================================================================
  # Database - PostgreSQL 16
  # =========================================================================
  # Handles: Persistent data storage
  # Entrypoint: Standard PostgreSQL
  # =========================================================================
  db:
    image: postgres:16-alpine
    container_name: akis-staging-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-akis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-akis_staging}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - akis-staging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-akis} -d ${POSTGRES_DB:-akis_staging}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.Name}}"

  # =========================================================================
  # MCP Gateway - GitHub Integration Bridge (always-on in staging)
  # =========================================================================
  # Handles: HTTP-to-stdio bridge for MCP protocol
  # Backend connects via: GITHUB_MCP_BASE_URL=http://mcp-gateway:4010/mcp
  # Requires: GITHUB_TOKEN in .env (PAT with repo + read:org scopes)
  # =========================================================================
  mcp-gateway:
    image: ghcr.io/${GITHUB_REPOSITORY:-omeryasironal/akis-platform-devolopment}/akis-mcp-gateway:${MCP_VERSION:-latest}
    container_name: akis-staging-mcp
    restart: unless-stopped
    expose:
      - "4010"
    environment:
      PORT: "4010"
      MCP_GATEWAY_PORT: "4010"
      MCP_GATEWAY_HOST: "0.0.0.0"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    networks:
      - akis-staging
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.Name}}"

# =========================================================================
# Networks
# =========================================================================
networks:
  akis-staging:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# =========================================================================
# Volumes
# =========================================================================
volumes:
  pgdata:
    name: akis-staging-pgdata
  caddy_data:
    name: akis-staging-caddy-data
  caddy_config:
    name: akis-staging-caddy-config
