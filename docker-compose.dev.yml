services:
  pg:
    image: postgres:16
    restart: unless-stopped
    ports: ["5433:5432"]     # <— host 5433, container 5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: akis_v2
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
  adminer:
    image: adminer
    ports: ["8080:8080"]
volumes:
  pgdata:
